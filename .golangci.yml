# golangci-lint version pinned in .github/workflows/ci.yml: v2.11.4
# To add a justified gosec suppression use an inline comment on the flagged line:
#   someFunc() // #nosec G204 - <one-line rationale explaining why it is safe>
# Never use a bare #nosec without a rule ID and rationale.

version: "2"

run:
  timeout: 5m
  allow-parallel-runners: true

linters-settings:
  goconst:
    min-len: 3
    min-occurrences: 5  # Increased from default 3 to reduce false positives
    ignore-tests: true  # Ignore test files
    match-constant: false  # Don't match against existing constants
    numbers: false  # Don't check for repeated numbers
    min: 3
    max: 3
  lll:
    line-length: 200  # Increased to accommodate detailed error messages, URLs, and function signatures
    tab-width: 1

issues:
  # don't skip warning about doc comments
  # don't exclude the default set of lint
  exclude-use-default: false
  # restore some of the defaults
  # (fill in the rest as needed)
  exclude-rules:
    - path: "api/*"
      linters:
        - lll
    - path: "internal/*"
      linters:
        - dupl
    # Exclude lll for webhook files (kubebuilder annotations are very long)
    - path: "_webhook\\.go$"
      linters:
        - lll
    # Exclude lll for test files (test data can be long)
    - path: "_test\\.go$"
      linters:
        - lll
    # Suppress typecheck false positives for Kubernetes generated code that
    # golangci-lint v2.11.4 occasionally mis-resolves in multi-module workspaces.
    # go build ./... passes cleanly; these exclusions cover lint-cache artefacts only.
    - linters:
        - typecheck
      text: "could not import k8s.io"
linters:
  disable-all: true
  enable:
    - dupl
    - errcheck
    - goconst
    - gocyclo
    - gofmt
    - goimports
    - gosimple
    - govet
    - ineffassign
    - lll
    - misspell
    - nakedret
    - prealloc
    - staticcheck
    - typecheck
    - unconvert
    - unparam
    - unused
