codecov:
  notify:
    wait_for_ci: true

coverage:
  precision: 2
  round: down
  range: "60...100"

  status:
    project:
      default:
        # Baseline gate: 41% (measured April 2026). Milestone targets:
        #   v1.0.10 → 50%  |  v1.1.0 → 60%  |  stretch → 75%
        # Raise this value as coverage improves.
        target: 41%
        threshold: 2%
        if_not_found: success
        if_ci_failed: error
    patch:
      default:
        # New code in a PR must not drop coverage by more than 5%.
        target: auto
        threshold: 5%
        if_not_found: success
        if_ci_failed: error

comment:
  layout: "reach,diff,flags,files"
  behavior: default
  require_changes: false

ignore:
  - "test/**"
  - "**/*_test.go"
  - "cmd/main.go"
