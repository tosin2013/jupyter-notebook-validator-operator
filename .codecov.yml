codecov:
  notify:
    wait_for_ci: true

coverage:
  precision: 2
  round: down
  range: "60...100"

  status:
    project:
      default:
        # Initial gate: 60% overall. Stretch goal is 75% (see docs/TESTING_GUIDE.md).
        target: 60%
        threshold: 2%
        if_not_found: success
        if_ci_failed: error
    patch:
      default:
        # New code in a PR must not drop coverage by more than 5%.
        target: auto
        threshold: 5%
        if_not_found: success
        if_ci_failed: error

comment:
  layout: "reach,diff,flags,files"
  behavior: default
  require_changes: false

ignore:
  - "test/**"
  - "**/*_test.go"
  - "cmd/main.go"
